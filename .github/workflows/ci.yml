name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "postgresql://pos:pos@localhost:5432/pos?schema=public"
  JWT_ACCESS_SECRET: "ci-access-secret"
  JWT_REFRESH_SECRET: "ci-refresh-secret"
  JWT_ACCESS_TTL: "30m"
  JWT_REFRESH_TTL: "30d"
  PORT: 3000
  CORS_ORIGIN: "http://localhost:5173"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pos
          POSTGRES_PASSWORD: pos
          POSTGRES_DB: pos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace apps/api

      - name: Run database migrations
        run: npm run prisma:deploy --workspace apps/api

      - name: Seed database
        run: npm run prisma:seed --workspace apps/api

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Build
        run: npm run build --workspaces --if-present

      - name: Unit tests (api)
        run: npm run test --workspace apps/api

      - name: E2E tests (api)
        run: npm run test:e2e --workspace apps/api
