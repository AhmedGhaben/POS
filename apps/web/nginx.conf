server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API path used by the frontend (see src/lib/api-client.ts) —
    # proxied to the "api" service so no CORS handling is needed in production.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Client-side routing (react-router) — unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
